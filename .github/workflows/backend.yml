name: Backend CI (prem branch)

on:
  push:
    branches: [ prem ]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      CI: true   # 👈 used to skip heavy stuff in your code

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      working-directory: backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install extra deps (safe fallback)
      working-directory: backend
      run: |
        pip install python-dotenv sqlalchemy psycopg2-binary uvicorn fastapi

    # ✅ Step 1: Import test (fast + reliable)
    - name: Test app import
      working-directory: backend
      run: |
        python -c "from app.main import app; print('✅ App imported successfully')"

    # ✅ Step 2: Start backend (lightweight)
    - name: Start FastAPI server
      working-directory: backend
      run: |
        uvicorn app.main:app --host 127.0.0.1 --port 8000 &
        sleep 5

    # ✅ Step 3: Test endpoint
    - name: Test health endpoint
      run: |
        curl http://127.0.0.1:8000/health || exit 1