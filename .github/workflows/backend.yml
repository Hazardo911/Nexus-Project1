name: Backend CI

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"

jobs:
  backend-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify model file exists
        run: test -f nexus_stgcn_v2.pth

      - name: Compile backend source
        run: python -m compileall app

      - name: Import FastAPI app
        run: |
          python -c "from app.main import app; print(app.title)"

      - name: Start backend
        run: |
          nohup python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > backend.log 2>&1 &

      - name: Wait for health endpoint
        run: |
          for i in {1..30}; do
            if curl --fail http://127.0.0.1:8000/health; then
              exit 0
            fi
            sleep 2
          done
          echo "Backend failed to start"
          cat backend.log
          exit 1

      - name: Smoke test summary endpoint
        run: curl --fail "http://127.0.0.1:8000/summary/?user_id=ci_user"

      - name: Upload backend log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-log
          path: backend/backend.log
